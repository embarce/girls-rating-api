basePath: /
definitions:
  handlers.AuthorResponse:
    properties:
      avatar:
        type: string
      name:
        type: string
    type: object
  handlers.CosplayItemResponse:
    properties:
      author:
        $ref: '#/definitions/handlers.AuthorResponse'
      height:
        type: integer
      id:
        type: string
      rating:
        type: integer
      resourceUrl:
        type: string
      views:
        type: string
      width:
        type: integer
    type: object
  handlers.CosplayListResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/handlers.CosplayListResponseData'
      msg:
        type: string
    type: object
  handlers.CosplayListResponseData:
    properties:
      currPage:
        type: integer
      list:
        items:
          $ref: '#/definitions/handlers.CosplayItemResponse'
        type: array
      pageSize:
        type: integer
      totalCount:
        type: integer
      totalPage:
        type: integer
    type: object
  handlers.ErrorResponse:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.LoginResponse:
    properties:
      code:
        type: integer
      data:
        additionalProperties:
          type: string
        type: object
      msg:
        type: string
    type: object
  handlers.RandomAPIResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/service.RandomItemResponse'
        type: array
      msg:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  handlers.RegisterResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/service.UserResponse'
      msg:
        type: string
    type: object
  response.APIResponse:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  service.AuthorResponse:
    description: 作者信息
    properties:
      avatar:
        type: string
      name:
        type: string
    type: object
  service.RandomItemResponse:
    description: 随机图片资源项
    properties:
      author:
        $ref: '#/definitions/service.AuthorResponse'
      height:
        type: integer
      rating:
        type: integer
      resourceUrl:
        type: string
      views:
        type: string
      width:
        type: integer
    type: object
  service.UserResponse:
    properties:
      avatar:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      nickname:
        type: string
      status:
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: 基于 Go 构建的 RESTful API 服务，支持用户注册、登录、认证等功能
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Girls Rating API
  version: "1.0"
paths:
  /api/cosplay:
    get:
      description: 按时间倒序分页返回图片资源列表
      parameters:
      - default: 1
        description: 页码，从 1 开始
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CosplayListResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 分页查询 Cosplay 图片资源
      tags:
      - 图片资源
  /api/random:
    get:
      description: 随机返回图片资源列表，无需认证
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RandomAPIResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 获取随机图片资源
      tags:
      - 图片资源
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码登录，返回 JWT token
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户登录
      tags:
      - 用户认证
  /api/v1/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.RegisterResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: 用户名或邮箱已存在
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户注册
      tags:
      - 用户认证
  /api/v1/user:
    get:
      description: 获取当前登录用户的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - 用户认证
  /health:
    get:
      description: 检查 API 服务是否正常运行
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 健康检查
      tags:
      - Health
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 使用 JWT token，格式：Bearer {token}
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
